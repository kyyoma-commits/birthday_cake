<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Party</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #480c12, #833a3a);
            text-align: center;
            margin: 0   ;
            padding: 0;
        }

        .container {
            background: white;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            width: 80%; 
            max-width: 600px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            color: #691f1f;
            font-size: 40px;
        }

        h2 {
            color: #000000;
        }

        img {
            border-radius: 15px;
            margin: 20px 0;
            transition: transform 0.3s ease;
        }

        img:hover {
            transform: scale(1.05);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #691f1f;
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #691f1f;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
        }

        a:hover {
            background: #480c12;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🎉 It's My Party!</h1>
        <h2>On the 20th June</h2>

        <img src="https://images.unsplash.com/photo-1464349153735-7db50ed83c84" width="100%" alt="foto saya"/>

        <h3>What to bring:</h3>
        <ul>
            <li>🍟 Snacks (I love snacks 😋)</li>
            <li>🥤 Drinks (Cold ones please!)</li>
            <li>🎶 Good vibes (Let's have fun!)</li>
            <li>🎶 edusheud (Let's have fun!)</li>

        </ul>

        <h3>📍 Location of the party:</h3>
        <a href="https://www.google.com/maps" target="_blank">
            Open Google Maps
        </a>
    </div>

</body>
</html>
